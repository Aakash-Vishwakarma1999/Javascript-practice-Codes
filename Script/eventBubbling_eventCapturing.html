<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>
    <div id="grandparent">
        <div id="parent">
            <button id="child">Click Me</button>
        </div>
    </div>

    <script>
        document.getElementById("child").addEventListener("click",(e)=>{
            console.log("child");
            e.stopPropagation();
            
        }
        )

        document.getElementById("parent").addEventListener("click", () => console.log("parent"));

    </script>
</body>

</html>

<!-- Event Capturing is when the event starts from the top (window/document) and goes down to the target element.
  flow: window → document → parent → target -->
<!-- 
  <body>
     <div id="parent">
        <button id="child">Click me</button>

        document.getElementById("parent").addEventListener("click", ()=>{
            console.log("Parent clicked (capturing)");
            },true) // true enables capturing i.e the flow is now from parent to child

        document.getElementById("child").addEventListener("click",()=>{
            console.log(" Child clicked");
            
        })

        
    </script>
  </body> -->
